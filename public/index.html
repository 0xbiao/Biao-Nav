<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-accent="ocean">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Biao导航 - 探索互联网的精彩。精选实用工具、开发资源与灵感网站的高颜值导航站。">
  <meta name="keywords" content="导航, 网址导航, 实用工具, 前端开发, 设计灵感, 网站收录">
  <meta name="theme-color" content="#0a0a0f">
  <!-- Open Graph -->
  <meta property="og:title" content="Biao导航 - 极简高颜值网址导航">
  <meta property="og:description" content="探索互联网的精彩。精选实用工具、开发资源与灵感网站的高颜值导航站。">
  <meta property="og:type" content="website">
  <title>Biao导航 - 极简网址导航</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 动态背景光球 -->
  <div class="bg-gradient">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- 顶部栏 -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <span class="logo-icon">🧭</span>
        <span class="logo-text" data-i18n="siteName">Biao导航</span>
      </div>

      <div class="search-container" style="display: flex; gap: var(--space-md); flex: 1; max-width: 600px;">
        <!-- 外部搜索 -->
        <div class="search-wrapper" style="flex: 1;">
          <div class="search-box">
            <button class="search-engine-btn" id="searchEngineBtn" title="切换搜索引擎">🌐</button>
            <input type="text" id="searchInputExternal" placeholder="Search...">
          </div>
          <div class="search-engines-dropdown" id="searchEnginesDropdown">
            <button class="search-engine-item active" data-engine="google" data-icon="🌐">🌐 Google</button>
            <button class="search-engine-item" data-engine="bing" data-icon="🔷">🔷 Bing</button>
            <button class="search-engine-item" data-engine="baidu" data-icon="🅱️">🅱️ <span data-i18n="engineBaidu">百度</span></button>
          </div>
        </div>

        <!-- 站内导航搜索 -->
        <div class="search-wrapper" style="flex: 1;">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInputInternal" data-i18n-placeholder="searchPlaceholder" placeholder="搜索导航...">
            <span class="kbd-hint" style="right: 14px;">/</span>
          </div>
        </div>
      </div>

      <div class="clock" id="clock"></div>

      <div class="controls">
        <!-- 语言切换 -->
        <button class="ctrl-btn" id="langToggle" title="切换语言">
          <span id="langIcon">中</span>
        </button>

        <!-- 主题切换 -->
        <div style="position:relative;">
          <button class="ctrl-btn" id="themeToggle" title="主题设置">🎨</button>
          <div class="dropdown-panel" id="themePanel">
            <div class="dropdown-title" data-i18n="themeLabel">主题风格</div>
            <div class="theme-grid" id="themeGrid">
              <div class="theme-option active" data-value="auto">
                <div class="swatch"></div>
                <span data-i18n="themeAuto">自动</span>
              </div>
              <div class="theme-option" data-value="dark">
                <div class="swatch"></div>
                <span data-i18n="themeDark">暗夜</span>
              </div>
              <div class="theme-option" data-value="light">
                <div class="swatch"></div>
                <span data-i18n="themeLight">明亮</span>
              </div>
              <div class="theme-option" data-value="aurora">
                <div class="swatch"></div>
                <span data-i18n="themeAurora">极光</span>
              </div>
              <div class="theme-option" data-value="nature">
                <div class="swatch"></div>
                <span data-i18n="themeNature">自然</span>
              </div>
              <div class="theme-option" data-value="cyber">
                <div class="swatch"></div>
                <span data-i18n="themeCyber">赛博</span>
              </div>
            </div>
            <div class="dropdown-title" data-i18n="accentLabel">配色方案</div>
            <div class="accent-grid" id="accentGrid">
              <div class="accent-option active" data-value="ocean" title="海洋蓝"></div>
              <div class="accent-option" data-value="flame" title="火焰橙"></div>
              <div class="accent-option" data-value="emerald" title="翡翠绿"></div>
              <div class="accent-option" data-value="violet" title="紫罗兰"></div>
              <div class="accent-option" data-value="rose" title="玫瑰金"></div>
              <div class="accent-option" data-value="glacier" title="冰川灰"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 分类标签栏 -->
  <nav class="categories-bar">
    <div class="container">
      <div class="categories-list" id="categoriesList">
        <button class="category-tag active" data-category="all" data-i18n="allCategories">全部</button>
      </div>
    </div>
  </nav>

  <!-- 导航卡片网格 -->
  <main class="container">
    <div class="nav-grid" id="navGrid">
      <!-- 骨架屏占位 -->
      <div class="skeleton-grid" id="skeletonGrid" style="grid-column:1/-1;">
        <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
      </div>
    </div>
  </main>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="backToTop" title="返回顶部">⬆️</button>

  <!-- 管理员入口 -->
  <a href="admin.html" class="admin-link" title="管理后台">⚙️</a>

  <script src="js/i18n.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
